<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trắc nghiệm Kinh tế chính trị Mác - Lênin</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f4f7;
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

.question{
    background:white;
    padding:18px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 0 6px rgba(0,0,0,0.1);
}

.question b{
    display:block;
    margin-bottom:8px;
}

label{
    display:block;
    margin:5px 0;
}

button{
    display:block;
    margin:25px auto;
    padding:12px 25px;
    font-size:18px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.result{
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>Trắc nghiệm Kinh tế chính trị Mác - Lênin</h1>

<form id="quizForm"></form>

<button onclick="submitQuiz()">Nộp bài</button>

<div class="result" id="result"></div>

<script>

const quiz=[

{
q:`1. Đối tượng nghiên cứu của Kinh tế chính trị Mác-Lênin là:`,
options:[
"Sản xuất của cải vật chất",
"Quan hệ xã hội giữa người với người",
"Quan hệ xã hội của sản xuất và trao đổi trong sự liên hệ biện chứng với trình độ phát triển của LLSX và kiến trúc thượng tầng",
"Quá trình sản xuất, phân phối, trao đổi, tiêu dùng"
],
answer:2
},

{
q:`2. Thuật ngữ “kinh tế chính trị” được sử dụng lần đầu tiên vào năm nào?`,
options:["1612","1615","1614","1618"],
answer:1
},

{
q:`3. Giá trị hàng hóa được quyết định bởi`,
options:[
"Sự khan hiếm hàng hóa",
"Sự hao phí sức lao động của con người",
"Lao động trừu tượng của người sản xuất kết tinh trong hàng hóa",
"Công dụng của hàng hóa"
],
answer:2
},

{
q:`4. Giá trị sử dụng của hàng hóa là gì?`,
options:[
"Là tính chất sẵn có của hàng hóa",
"Là phạm trù lịch sử của hàng hóa",
"Là công dụng của hàng hóa có thể thỏa mãn nhu cầu nào đó của con người",
"Là thuộc tính tự nhiên của hàng hóa có thể thỏa mãn nhu cầu nào đó của con người"
],
answer:2
},

{
q:`5. Hình thức xuất khẩu chủ yếu của chủ nghĩa tư bản hiện nay là gì?`,
options:[
"Xuất khẩu tư bản kết hợp xuất khẩu hàng hóa",
"Đầu tư trực tiếp kết hợp đầu tư gián tiếp",
"Đầu tư gián tiếp",
"Đầu tư trực tiếp"
],
answer:1
},

{
q:`6. Theo quan điểm của C.Mác, hàng hóa là gì?`,
options:[
"Hàng hóa là sản phẩm của lao động để thỏa mãn nhu cầu vật chất và tinh thần của con người.",
"Hàng hóa là sản phẩm của lao động có thể thỏa mãn nhu cầu nào đó của con người thông qua trao đổi mua bán.",
"Hàng hóa là các sản phẩm có ích và do lao động của người sản xuất làm ra.",
"Hàng hóa là do lao động của người sản xuất làm ra"
],
answer:1
},

{
q:`7. Định nghĩa đúng về Tư bản là:`,
options:[
"Tiền và máy móc thiết bị",
"Tiền có khả năng đẻ ra tiền",
"Giá trị mang lại giá trị thặng dư bằng cách bóc lột lao động làm thuê",
"Công cụ sản xuất và nguyên vật liệu"
],
answer:2
},

{
q:`8. Nền kinh tế tri thức được xem là:`,
options:[
"Một phương thức sản xuất mới",
"Một hình thái kinh tế - xã hội mới",
"Một giai đoạn mới của CNTB hiện đại",
"Một nấc thang phát triển của lực lượng sản xuất"
],
answer:3
},

{
q:`9. Nhà kinh điển nào sau đây nghiên cứu sâu về CNTB độc quyền?`,
options:[
"C. Mác",
"C. Mác và Ăngghen",
"V.I. Lênin",
"Ph. Ăngghen"
],
answer:2
},

{
q:`10. Quá trình chuyển đổi nền sản xuất xã hội từ lao động thủ công sang sử dụng phổ biến công nghệ, phương tiện hiện đại gọi là gì?`,
options:[
"Công nghiệp hóa",
"Hiện đại hóa",
"Công nghiệp hóa, hiện đại hóa",
"Tự động hóa"
],
answer:2
}

];

const form=document.getElementById("quizForm");

quiz.forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";

let html=`<b>${q.q}</b>`;

q.options.forEach((opt,j)=>{
html+=`<label><input type="radio" name="q${i}" value="${j}"> ${opt}</label>`;
});

div.innerHTML=html;
form.appendChild(div);
});

function submitQuiz(){

let score=0;

quiz.forEach((q,i)=>{
let ans=document.querySelector(`input[name="q${i}"]:checked`);

if(ans && Number(ans.value)===q.answer){
score++;
}
});

document.getElementById("result").innerHTML=
"Bạn đúng "+score+" / "+quiz.length+" câu";

}

</script>

</body>
</html>
