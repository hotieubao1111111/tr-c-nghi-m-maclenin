<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trắc nghiệm Kinh tế chính trị</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
padding:20px;
max-width:900px;
margin:auto;
}

h1{
text-align:center;
}

.question{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

button{
display:block;
margin:20px auto;
padding:12px 25px;
font-size:18px;
cursor:pointer;
background:#2c7be5;
color:white;
border:none;
border-radius:8px;
}

.result{
font-size:24px;
text-align:center;
font-weight:bold;
margin-top:20px;
}

</style>
</head>

<body>

<h1>Trắc nghiệm Kinh tế chính trị</h1>

<form id="quizForm"></form>

<button onclick="submitQuiz()">Nộp bài</button>

<div class="result" id="result"></div>

<script>

const quiz=[

{q:"1. Đối tượng nghiên cứu của Kinh tế chính trị Mác-Lênin là:",options:["Sản xuất của cải vật chất","Quan hệ xã hội giữa người với người","Quan hệ xã hội của sản xuất và trao đổi trong sự liên hệ với LLSX","Quá trình sản xuất, phân phối, trao đổi, tiêu dùng"],answer:2},

{q:"2. Thuật ngữ 'kinh tế chính trị' xuất hiện năm nào?",options:["1612","1615","1614","1618"],answer:1},

{q:"3. Giá trị hàng hóa được quyết định bởi:",options:["Sự khan hiếm","Hao phí sức lao động","Lao động trừu tượng kết tinh trong hàng hóa","Công dụng"],answer:2},

{q:"4. Giá trị sử dụng của hàng hóa là:",options:["Tính chất sẵn có","Phạm trù lịch sử","Công dụng thỏa mãn nhu cầu con người","Thuộc tính tự nhiên"],answer:2},

{q:"5. Hình thức xuất khẩu chủ yếu của CNTB hiện nay:",options:["Xuất khẩu tư bản + hàng hóa","Đầu tư trực tiếp + gián tiếp","Đầu tư gián tiếp","Đầu tư trực tiếp"],answer:1},

{q:"6. Theo C.Mác hàng hóa là:",options:["Sản phẩm lao động thỏa nhu cầu","Sản phẩm lao động để trao đổi mua bán","Sản phẩm có ích do lao động","Do lao động tạo ra"],answer:1},

{q:"7. Định nghĩa đúng về tư bản:",options:["Tiền và máy móc","Tiền đẻ ra tiền","Giá trị mang lại giá trị thặng dư","Công cụ sản xuất"],answer:2},

{q:"8. Kinh tế tri thức là:",options:["Phương thức sản xuất mới","Hình thái kinh tế xã hội mới","Giai đoạn mới CNTB","Nấc thang phát triển LLSX"],answer:3},

{q:"9. Ai nghiên cứu sâu CNTB độc quyền:",options:["C.Mác","C.Mác và Ăngghen","V.I.Lênin","Ph.Ăngghen"],answer:2},

{q:"10. Quá trình chuyển từ lao động thủ công sang công nghệ hiện đại:",options:["Công nghiệp hóa","Hiện đại hóa","Công nghiệp hóa hiện đại hóa","Tự động hóa"],answer:2},

{q:"11. Ai đưa ra khái niệm kinh tế chính trị:",options:["Antoine Montchretien","Tomas Mun","William Petty","Quesnay"],answer:0},

{q:"12. Vì sao cạnh tranh không bị thủ tiêu:",options:["Độc quyền cạnh tranh ngoài","Độc quyền cạnh tranh nhau","Cạnh tranh là quy luật khách quan","Do nội bộ cạnh tranh"],answer:2},

{q:"13. Kế thừa trường phái kinh tế nào:",options:["Trọng thương","Trọng nông","Kinh tế chính trị cổ điển Anh","Kinh tế tầm thường"],answer:2},

{q:"14. Sản xuất hàng hóa ra đời khi:",options:["Phân công lao động và tách biệt kinh tế","Phân công lao động và tách biệt tương đối","Phân công cá biệt và tư hữu","Phân công lao động và công hữu"],answer:0},

{q:"15. Phương thức phát triển tốt nhất trong toàn cầu hóa:",options:["Bảo hộ mậu dịch","Hội nhập kinh tế quốc tế","Hợp tác cùng hệ thống","Hợp tác khu vực"],answer:1},

{q:"16. Quy luật giá trị yêu cầu:",options:["Hao phí cá biệt","Hao phí lao động xã hội cần thiết","Hao phí thời gian lao động","Hao phí lao động quá khứ"],answer:1},

{q:"17. Công thức chung của tư bản:",options:["T-H-T'","T-H-SLĐ","H-T-H","H-SLĐ-H'"],answer:0},

{q:"18. Giá trị thặng dư là:",options:["Lợi nhuận","Giá trị tự tăng","Giá trị dôi ra ngoài sức lao động","Hiệu số giá trị"],answer:2},

{q:"19. Mô hình kinh tế VN hiện nay:",options:["KTTT có quản lý","KT nhiều thành phần","KT nhiều thành phần quản lý","KTTT định hướng XHCN"],answer:3},

{q:"20. Đặc trưng CMCN 4.0:",options:["Năng lượng hơi nước","CNTT tự động hóa","Liên kết thế giới thực và ảo","Năng lượng điện"],answer:2},

{q:"21. Ai phát hiện lao động hai mặt:",options:["A.Smith","Ricardo","C.Mác","Ăngghen"],answer:2},

{q:"22. Học thuyết hòn đá tảng:",options:["Giá trị","Giá trị thặng dư","Tích lũy tư bản","Tái sản xuất"],answer:1},

{q:"23. Chọn câu sai về KTTT:",options:["Đối lập KT tự nhiên","Đối lập chế độ xã hội","Thành tựu chung","Phát triển mạnh CNTB"],answer:1},

{q:"24. Kết quả cạnh tranh độc quyền:",options:["Mở rộng sản xuất","Thỏa hiệp hoặc phá sản","Hợp tác","Ứng dụng KH"],answer:1},

{q:"25. Bán đúng giá trị:",options:["p=m","p>m","p<m","p=0"],answer:0},

{q:"26. Không ảnh hưởng tỷ suất lợi nhuận:",options:["Tỷ suất GT thặng dư","Cạnh tranh","Tốc độ chu chuyển","Cấu tạo hữu cơ"],answer:1},

{q:"27. Tư bản bất biến:",options:["Chuyển qua khấu hao","Giá trị tăng","Không đổi chuyển sau chu kỳ","Chuyển nguyên vẹn"],answer:2},

{q:"28. Tiền lương TBCN:",options:["Giá trị lao động","Trả công","Giá cả sức lao động","Giá trị sức lao động"],answer:2},

{q:"29. Sản xuất GT thặng dư tuyệt đối:",options:["Kéo dài ngày lao động","Tiết kiệm chi phí","Kỹ thuật tiên tiến","Tăng năng suất"],answer:0},

{q:"30. Tư bản tài chính do:",options:["Độc quyền ngân hàng","Thị trường tài chính","Độc quyền CN","Liên kết ngân hàng và CN"],answer:3},

{q:"31. Nguyên nhân CNTB độc quyền:",options:["Đấu tranh giai cấp","Nhà nước can thiệp","Tích tụ và tập trung SX","Phân công lao động"],answer:2},

{q:"32. Chức năng cơ bản nhất của tiền:",options:["Thước đo giá trị","Phương tiện lưu thông","Cất trữ","Thanh toán"],answer:0},

{q:"33. Người sáng lập chủ nghĩa Mác:",options:["C.Mác","Mác và Lênin","Mác và Ăngghen","Mác Ăngghen Lênin"],answer:2},

{q:"34. Quan hệ cung cầu thuộc khâu:",options:["Sản xuất và tiêu dùng","Tiêu dùng","Trao đổi","Phân phối và trao đổi"],answer:0},

{q:"35. Khác biệt KTTT XHCN:",options:["Điều tiết nhà nước","Nhiều thành phần","Vai trò chủ đạo KTNN","Nhiều sở hữu"],answer:2},

{q:"36. C và V thuộc tư bản:",options:["Tư bản tiền tệ","Tư bản sản xuất","Tư bản hàng hóa","Tư bản lưu thông"],answer:0},

{q:"37. Giá trị hàng hóa quyết định bởi:",options:["Khan hiếm","Hao phí sức lao động","Lao động trừu tượng","Công dụng"],answer:2},

{q:"38. Bản chất CNTB độc quyền nhà nước:",options:["Kết hợp độc quyền tư nhân và nhà nước","Nhà nước chi phối","Độc quyền phụ thuộc","Thỏa hiệp"],answer:0},

{q:"39. Chủ thể xuất khẩu tư bản:",options:["Tư bản tư nhân","Độc quyền trong nước","Độc quyền xuyên quốc gia","Tư bản nhà nước"],answer:2},

{q:"40. Công thức giá trị hàng hóa:",options:["G=c+(v+p)","G=c+(v+m)","G=v+m","G=c+v"],answer:1},

{q:"41. CNH cổ điển Anh bắt đầu:",options:["Dệt","VLXD","Cơ khí","Chế biến"],answer:0},

{q:"42. Quan điểm đúng KTTT:",options:["Do CNTB sinh","Cùng bản chất KT hàng hóa","Tồn tại chủ quan","Sản phẩm riêng CNTB"],answer:1},

{q:"43. Biểu hiện quy luật GT thặng dư:",options:["Giá cả SX","Giá cả độc quyền","Lợi nhuận độc quyền","Tỷ suất lợi nhuận bình quân"],answer:3},

{q:"44. Mác nghiên cứu TBCN từ:",options:["Lưu thông","SX của cải","SX hàng hóa giản đơn","SX GT thặng dư"],answer:2},

{q:"45. Quy luật giá trị tồn tại:",options:["SX hàng hóa giản đơn","SX TBCN","SX vật chất","KT hàng hóa"],answer:3},

{q:"46. Tỷ suất GT thặng dư phản ánh:",options:["Trình độ bóc lột","Hiệu quả đầu tư","Nơi đầu tư","Quy mô bóc lột"],answer:0},

{q:"47. Đặc điểm CNH NICs:",options:["Ưu tiên CN nhẹ","Ưu tiên CN nặng","Đẩy mạnh xuất khẩu thu hút nguồn lực ngoài","Xuất khẩu dựa trong nước"],answer:2},

{q:"48. Mục đích CNH HĐH:",options:["Năng suất cao","Thị trường sôi động","Cơ hội lao động","Xây dựng cơ sở vật chất hiện đại"],answer:3},

{q:"49. Chia tư bản C và V để:",options:["Đặc điểm di chuyển","Nguồn gốc GT thặng dư","Vai trò lao động","Bản chất sản xuất"],answer:1},

{q:"50. Khi cung > cầu thì:",options:["Giá < giá trị","Giá > giá trị","Giá = giá trị","Không ảnh hưởng"],answer:0}

];

const form=document.getElementById("quizForm");

quiz.forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";

let html=`<b>${q.q}</b><br>`;

q.options.forEach((opt,j)=>{
html+=`<label><input type="radio" name="q${i}" value="${j}"> ${opt}</label><br>`;
});

div.innerHTML=html;
form.appendChild(div);
});

function submitQuiz(){

let score=0;

quiz.forEach((q,i)=>{

let ans=document.querySelector(`input[name="q${i}"]:checked`);

if(ans && Number(ans.value)===q.answer){
score++;
}

});

document.getElementById("result").innerHTML="Bạn đúng "+score+" / "+quiz.length+" câu";

}

</script>

</body>
</html>
